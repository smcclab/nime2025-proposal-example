name: Build Proposal Documents

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [created]

# Allow this workflow to publish to GitHub Pages and attach release assets.
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container: pandoc/core:3.8

    steps:
      - uses: actions/checkout@v6

      - name: Build documents
        run: |
          mkdir -p build/site
          # Website: index.html plus the media/ folder so images resolve via
          # their relative paths (e.g. media/image1.jpg).
          pandoc nime2025-proposal-public.md -o build/site/index.html --standalone
          cp -r media build/site/media
          pandoc nime2025-proposal-public.md -o build/nime2025-proposal-public.docx

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: proposal-documents
          path: |
            build/site
            build/nime2025-proposal-public.docx

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/site/index.html
            build/nime2025-proposal-public.docx

  deploy:
    needs: build
    # Only publish the website on pushes to main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download built site
        uses: actions/download-artifact@v8
        with:
          name: proposal-documents
          path: artifact

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: artifact/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
